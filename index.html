<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1115">
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for(let r of regs) r.unregister();
            });
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500&display=swap" rel="stylesheet">
    
    <title>next adventure</title>
    <style>
        :root { --bg-dark: #0f1115; --bg-light: #f4f5f7; --accent: rgba(255, 255, 255, 0.9); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        html, body { 
            height: 100%; width: 100%; margin: 0; 
            background-color: var(--bg-dark); 
            overflow-x: hidden;
            overflow-y: auto;
            scrollbar-width: none;
            -webkit-font-smoothing: antialiased;
        }
        body::-webkit-scrollbar { display: none; }
        
        body { 
            color: var(--accent); font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body.light-mode { background-color: var(--bg-light); color: #2d3748; --accent: #2d3748; }

        .sync-reveal { 
            opacity: 0; 
            transform: translateY(12px); 
            transition: opacity 1s ease, transform 1s cubic-bezier(0.2, 0, 0, 1); 
            will-change: transform, opacity;
        }
        .sync-reveal.reveal { opacity: 1 !important; transform: translateY(0); }
        
        .timer-container { 
            position: relative; text-align: center; width: 90%; max-width: 480px; 
            z-index: 10; display: flex; flex-direction: column; align-items: center; 
            min-height: 100dvh; justify-content: center; padding: 60px 0;
        }
        
        h1 { font-weight: 500; letter-spacing: -0.05em; font-size: clamp(1.8rem, 6vw, 2.5rem); margin: 0; text-transform: lowercase; }
        h1 span { font-size: 0.8em; margin-left: 8px; }

        /* THE FLOATING POLAROIDS: Bigger on Desktop, Fully visible on Mobile */
        .polaroid-header {
            position: absolute; 
            top: 10px; /* Connects the twine to the top */
            left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 320px; /* Increased from 260px */
            cursor: pointer; z-index: 15;
            /* Animation REMOVED */
            transform-origin: top center;
        }
        .polaroid-header img { width: 100%; height: auto; display: block; }
        
        @media (min-width: 1024px) { .polaroid-header { max-width: 420px; top: 15px; } }
        @media (max-width: 600px) { .polaroid-header { max-width: 240px; top: 20px; } }

        /* Animation Keyframes REMOVED */

        .message-slot { 
            position: relative; width: 100%; height: 60px; margin-top: 15px; margin-bottom: 25px; 
            display: flex; align-items: center; justify-content: center; 
        }

        #full-date-display, #description-display { 
            position: absolute; width: 100%; font-size: 0.95rem; opacity: 0.5; font-weight: 400; 
            letter-spacing: 0.02em; transition: opacity 0.5s ease; will-change: opacity;
        }

        #countdown { display: flex; justify-content: center; gap: 15px; width: 100%; min-height: 80px; transition: opacity 0.5s ease; }
        .time-box { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .time-box span { font-size: clamp(2.2rem, 8vw, 3.5rem); font-weight: 200; display: block; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1; }
        .time-box span.is-due { opacity: 0.1 !important; }
        .label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.25em; margin-top: 12px; opacity: 0.3; font-weight: 500; }

        #task-section { position: relative; width: 100%; max-width: 420px; margin-top: 20px; text-align: left; }
        #new-task-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid transparent; color: inherit; font-family: inherit; font-size: 0.95rem; padding: 12px 0; transition: border 0.3s; }
        #new-task-input:focus { border-bottom: 1px solid rgba(128,128,128,0.2); }

        .list-container { position: relative; width: 100%; margin-top: 5px; }
        #task-list { 
            list-style: none; padding: 0; margin: 0; max-height: 25vh; overflow-y: auto; scrollbar-width: none; 
            -webkit-mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
            overscroll-behavior: contain;
        }
        #task-list::-webkit-scrollbar { display: none; }
        #task-list li { font-size: 0.95rem; display: flex; align-items: center; justify-content: space-between; min-height: 48px; border-bottom: 1px solid rgba(128,128,128,0.05); animation: fadeIn 0.3s ease forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .task-text { display: flex; align-items: center; gap: 14px; cursor: pointer; flex: 1; padding: 10px 0; line-height: 1.4; transition: transform 0.1s; }
        .task-text:active { transform: scale(0.98); }
        .task-text::before { content: '○'; font-size: 1.2em; opacity: 0.5; width: 24px; text-align: center; flex-shrink: 0; }
        li.done .task-text { text-decoration: line-through; opacity: 0.3; }
        li.done .task-text::before { content: '●'; opacity: 0.8; }
        
        .task-actions { display: flex; gap: 0px; opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
        #task-list li:hover .task-actions { opacity: 1; }
        @media (hover: none) { .task-actions { opacity: 0.5; } }
        
        .action-btn { background: transparent; border: none; color: inherit; padding: 6px; cursor: pointer; display: flex; align-items: center; opacity: 0.3; transition: all 0.2s; }
        .action-btn:active { transform: scale(0.8); }
        .action-btn:hover { opacity: 1; }
        .action-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }

        .edit-task-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--accent); color: inherit; font-family: inherit; font-size: 0.95rem; padding: 4px 0; outline: none; }

        /* LIGHTBOX & POLAROID FRAME */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 17, 21, 0.98); display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 10000; padding: 20px; backdrop-filter: blur(8px);
        }
        #lightbox.open { opacity: 1; pointer-events: auto; }

        .polaroid-frame {
            background: #fff; padding: 15px 15px 60px 15px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.9) rotate(-2deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%; max-height: 80vh;
            display: flex; flex-direction: column;
        }
        #lightbox.open .polaroid-frame { transform: scale(1) rotate(0deg); }

        .polaroid-frame img {
            max-width: 100%;
            max-height: 60vh;
            object-fit: cover;
            display: block;
        }

        .polaroid-empty {
            width: 300px; height: 300px; background: #fdfdfd;
            display: flex; align-items: center; justify-content: center; text-align: center;
            padding: 40px; color: #4a5568; font-size: 1.1rem; line-height: 1.5; font-style: italic;
            border: 1px inset rgba(0,0,0,0.03);
        }
        @media (max-width: 600px) { .polaroid-empty { width: 260px; height: 260px; font-size: 1rem; } }

        #scroll-indicator { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.4s ease; pointer-events: none; display: flex; justify-content: center; }
        #scroll-indicator svg { width: 20px; height: 20px; stroke: currentColor; fill: none; }
        #scroll-indicator.visible { opacity: 0.5; animation: bounce 2.5s infinite ease-in-out; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translate(-50%, 0);} 40% {transform: translate(-50%, -6px);} 60% {transform: translate(-50%, -3px);} }

        #theme-toggle { position: fixed; bottom: 30px; right: 30px; border: none; background: none; opacity: 0.3; cursor: pointer; color: inherit; z-index: 100; padding: 10px; transition: transform 0.2s; }
        #theme-toggle:active { transform: rotate(15deg) scale(1.1); }
        #theme-toggle svg { width: 22px; height: 22px; stroke: currentColor; fill: none; }
        
        #cat-perch { position: fixed; bottom: 20px; left: 20px; width: 100px; height: 100px; z-index: 999; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #cat-perch:active { transform: scale(1.1); }
        @media (min-width: 1024px) { #cat-perch { width: 160px; height: 160px; } }
        .cat-image { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: bottom left; image-rendering: -webkit-optimize-contrast; -webkit-mask-image: radial-gradient(circle at center, black 80%, transparent 100%); }

        .hidden-v { opacity: 0 !important; pointer-events: none; }
        
        .suri-1 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri1.png'); }
        .suri-2 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri2.png'); }
        .suri-3 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri3.png'); }
        .suri-4 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri4.png'); }
        .suri-5 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri5.png'); }
        .suri-6 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri6.png'); }
        .suri-7 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri7.png'); }
    </style>
</head>
<body>
    <div id="lightbox" onclick="UI.toggleLightbox(false)">
        <div class="polaroid-frame" onclick="event.stopPropagation()">
            <img src="" id="enlarged-photo" style="display:none;">
            <div id="enlarged-empty" class="polaroid-empty" style="display:none;">
                first photo pending. requirements: you, me, and a camera.
            </div>
        </div>
    </div>

    <div class="polaroid-header sync-reveal" onclick="UI.toggleLightbox(true)">
        <img src="https://raw.githubusercontent.com/Erunn/nextadventure/main/polaroids.png" alt="Memory">
    </div>

    <div id="cat-perch" class="sync-reveal"></div> 
    
    <button id="theme-toggle" class="sync-reveal">
        <svg id="sun-icon" style="display:none;" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moon-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
    
    <main class="timer-container sync-reveal">
        <h1 id="event-name"></h1>
        <div class="message-slot">
            <div id="full-date-display" class="hidden-v"></div>
            <div id="description-display" class="hidden-v"></div>
        </div>
        <div id="countdown" class="hidden-v">
            <div class="time-box"><span id="days">00</span><div class="label">days</div></div>
            <div class="time-box"><span id="hours">00</span><div class="label">hrs</div></div>
            <div class="time-box"><span id="minutes">00</span><div class="label">min</div></div>
            <div class="time-box"><span id="seconds">00</span><div class="label">sec</div></div>
        </div>
        <section id="task-section" style="display:none;">
            <input type="text" id="new-task-input" placeholder="I would love to..." autocomplete="off">
            <div class="list-container">
                <ul id="task-list"></ul>
                <div id="scroll-indicator"><svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
            </div>
        </section>
    </main>
    <script>document.write('<script src="main.js?v=' + Date.now() + '"><\/script>');</script>
</body>
</html>
