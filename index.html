<style>
        :root{--bg-dark:#0f1115;--bg-light:#f4f5f7;--accent:rgba(255,255,255,0.85);--safe-bottom:env(safe-area-inset-bottom,20px)}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
        
        html{height:101%;background-color:var(--bg-dark);scrollbar-width:none}
        body{margin:0;width:100%;min-height:101vh;background-color:var(--bg-dark);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),radial-gradient(circle at top,#161921,var(--bg-dark));background-blend-mode:overlay;color:var(--accent);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;display:flex;justify-content:center;align-items:center;transition:background-color .5s ease;-ms-overflow-style:none}
        html::-webkit-scrollbar,body::-webkit-scrollbar{display:none!important;width:0!important;height:0!important}
        body.light-mode{background-color:var(--bg-light);background-image:radial-gradient(circle at top,#ffffff,var(--bg-light));color:#374151}
        
        .sync-reveal{opacity:0;transform:translate3d(0, 10px, 0);transition:all .9s cubic-bezier(.25,.1,.25,1);backface-visibility:hidden;will-change:opacity,transform}
        .sync-reveal.reveal{opacity:1!important;transform:translate3d(0, 0, 0)}
        .timer-container{position:relative;text-align:center;width:90%;max-width:500px;padding:20px;z-index:10}
        
        h1, #description-display, #full-date-display {-webkit-user-select:text;user-select:text}
        
        h1{font-weight:500;letter-spacing:-.04em;font-size:clamp(1.8rem,6vw,2.2rem);margin-bottom:30px;text-transform:lowercase;min-height:1.2em;display:flex;justify-content:center;align-items:center;gap:0.2em}
        
        /* VISUAL TWEAK 1: Scaled and centered emoji */
        h1 span {font-size:0.75em; line-height:1; display:inline-block; transform:translateY(-0.05em)}
        
        #description-display,#full-date-display{margin-bottom:30px;font-size:1rem;font-weight:400;opacity:.65;line-height:1.6;letter-spacing:0.01em}
        
        #countdown{display:flex;justify-content:space-between;align-items:center;margin:0 auto 40px auto;max-width:400px;transition:opacity 0.5s ease}
        .time-box {flex: 1; display: flex; flex-direction: column; align-items: center; contain: strict; height: 80px;}
        
        .time-box span{font-family:'SF Mono','ui-monospace',monospace;font-size:clamp(2.2rem,8vw,3.5rem);font-weight:200;display:block;line-height:1;font-variant-numeric:tabular-nums;transition:all .5s ease}
        .time-box span.is-due{opacity:.1;filter:blur(.5px);transform:scale(.95)}
        
        /* VISUAL TWEAK 2: Ethereal, delicate labels */
        .label{font-size:.6rem;text-transform:uppercase;letter-spacing:.2em;margin-top:12px;color:rgba(255,255,255,.3);font-weight:400}
        body.light-mode .label{color:rgba(0,0,0,.35)}
        
        #theme-toggle{position:fixed;bottom:calc(20px + var(--safe-bottom));right:calc(30px + env(safe-area-inset-right,20px));border:none;background:none;cursor:pointer;padding:12px;color:inherit;opacity:.3;transition:opacity .4s ease;z-index:100}
        #theme-toggle:hover{opacity:.6}
        
        #cat-perch{position:fixed;bottom:var(--safe-bottom);left:calc(20px + env(safe-area-inset-left,20px));width:100px;height:100px;z-index:999;cursor:pointer}
        @media (min-width:1024px){#cat-perch{width:180px;height:180px}}
        
        /* VISUAL TWEAK 3: Softened Suri blending */
        .cat-image{width:100%;height:100%;background-size:contain;background-repeat:no-repeat;background-position:bottom left;contain:strict;pointer-events:none;opacity:0.85;transition:opacity 0.3s ease}
        #cat-perch:active .cat-image {opacity:1}
        
        .suri-1{background-image:url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri1.png')}
        .suri-2{background-image:url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri2.png')}
        .suri-3{background-image:url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri3.png')}
        .suri-4{background-image:url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri4.png')}
        .suri-5{background-image:url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri5.png')}
        .suri-6{background-image:url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri6.png')}
        .suri-7{background-image:url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri7.png')}
    </style>
