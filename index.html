    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Next Adventure</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #121417;
            --bg-light: #f9fafb;
            --accent: #ffffff;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),
                radial-gradient(circle at top, #1c1f26, var(--bg-dark));
            background-blend-mode: overlay;
            color: var(--accent);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex; justify-content: center; align-items: center; 
            min-height: 101vh; /* Enable pull-to-refresh */
            margin: 0;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
            overscroll-behavior-y: auto;
        }

        body.light-mode {
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at top, #ffffff, var(--bg-light));
            color: #111827;
        }

        .sync-reveal {
            opacity: 0;
            transform: translateY(12px) translateZ(0);
            transition: opacity 0.8s cubic-bezier(0.2, 0, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
            backface-visibility: hidden;
            will-change: opacity, transform;
        }

        .sync-reveal.reveal {
            opacity: 1 !important;
            transform: translateY(0) translateZ(0);
        }

        .timer-container {
            position: relative; text-align: center; width: 90%; max-width: 500px; padding: 20px; z-index: 10;
        }
