<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Next Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>
        var v = new Date().getTime();
        document.write('<link rel="stylesheet" href="style.css?v=' + v + '">');
    </script>
</head>
<body>
    <div id="cat-perch"></div> 
    <div class="timer-container">
        <h1 id="event-name">Loading...</h1>
        
        <div id="countdown" style="display: none;">
            <div class="time-box"><span id="days">00</span><div class="label">Days</div></div>
            <div class="time-box"><span id="hours">00</span><div class="label">Hrs</div></div>
            <div class="time-box"><span id="minutes">00</span><div class="label">Min</div></div>
            <div class="time-box"><span id="seconds">00</span><div class="label">Sec</div></div>
        </div>

        <div id="description-display" style="display: none;"></div>
        <div id="full-date-display" style="display: none;"></div>
        <p id="status-message" style="display: none;"></p>
    </div>

    <button id="theme-toggle" aria-label="Toggle Theme">
        <svg id="sun-icon" class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moon-icon" class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <script>document.write('<script src="script.js?v=' + v + '"><\/script>');</script>
</body>
</html>
