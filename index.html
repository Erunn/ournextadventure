<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Next Adventure</title>
    
    <style>
        :root {
            --bg-dark: #121417;
            --bg-light: #f9fafb;
            --accent: #ffffff;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),
                radial-gradient(circle at top, #1c1f26, var(--bg-dark));
            background-blend-mode: overlay;
            color: var(--accent);
            /* Fix: System font stack to avoid CORS font errors */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex; justify-content: center; align-items: center; 
            min-height: 101vh; margin: 0;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
            overscroll-behavior-y: auto;
        }

        body.light-mode {
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at top, #ffffff, var(--bg-light));
            color: #111827;
        }

        .sync-reveal {
            opacity: 0;
            transform: translateY(12px) translateZ(0);
            transition: opacity 0.8s cubic-bezier(0.2, 0, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
            backface-visibility: hidden;
            will-change: opacity, transform;
        }

        .sync-reveal.reveal {
            opacity: 1 !important;
            transform: translateY(0) translateZ(0);
        }

        .timer-container {
            position: relative; text-align: center; width: 90%; max-width: 500px; padding: 20px; z-index: 10;
        }

        h1 { font-weight: 600; letter-spacing: -0.02em; font-size: clamp(1.8rem, 6vw, 2.2rem); margin-bottom: 30px; text-transform: lowercase; }
        
        #countdown { display: flex; justify-content: space-around; align-items: center; margin: 40px auto; gap: 8px; }

        .time-box span { 
            font-family: 'SF Mono', 'ui-monospace', monospace; 
            font-size: clamp(2.2rem, 8vw, 3.5rem); 
            font-weight: 300; display: block; line-height: 1; 
            font-variant-numeric: tabular-nums;
            transition: all 0.4s ease; 
        }

        .time-box span.is-due { opacity: 0.12; filter: blur(0.5px); transform: scale(0.92); }

        .label { 
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; 
            margin-top: 10px; color: rgba(255, 255, 255, 0.4); font-weight: 500;
        }
        body.light-mode .label { color: rgba(0, 0, 0, 0.5); }

        #theme-toggle {
            position: fixed; 
            bottom: calc(20px + var(--safe-bottom)); 
            right: calc(30px + env(safe-area-inset-right, 20px)); 
            border: none; background: none; cursor: pointer; padding: 12px; 
            color: inherit; opacity: 0.4; transition: all 0.3s ease; z-index: 100;
        }

        #cat-perch { 
            position: fixed; 
            bottom: var(--safe-bottom); 
            left: calc(20px + env(safe-area-inset-left, 20px)); 
            width: 100px; height: 100px; z-index: 15; 
        }

        @media (min-width: 1024px) { #cat-perch { width: 180px; height: 180px; } }

        .cat-image { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: bottom left; }

        /* Suri Assets */
        .suri-1 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri1.png'); }
        .suri-2 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri2.png'); }
        .suri-3 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri3.png'); }
        .suri-4 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri4.png'); }
        .suri-5 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri5.png'); }
        .suri-6 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri6.png'); }
        .suri-7 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri7.png'); }

        #description-display, #full-date-display { margin-top: 25px; font-size: 1rem; font-weight: 400; opacity: 0.7; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="cat-perch" class="sync-reveal"></div> 

    <button id="theme-toggle" class="sync-reveal" aria-label="Toggle Theme">
        <svg id="sun-icon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <main class="timer-container sync-reveal">
        <h1 id="event-name">loading...</h1>
        <div id="countdown" style="display: none;">
            <div class="time-box"><span id="days">00</span><div class="label">days</div></div>
            <div class="time-box"><span id="hours">00</span><div class="label">hrs</div></div>
            <div class="time-box"><span id="minutes">00</span><div class="label">min</div></div>
            <div class="time-box"><span id="seconds">00</span><div class="label">sec</div></div>
        </div>
        <div id="description-display" style="display: none;"></div>
        <div id="full-date-display" style="display: none;"></div>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
