<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1115">
    
    <script>
        // Kills old service workers to ensure the "Pull to Refresh" always works
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for(let r of regs) r.unregister();
            });
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500&display=swap" rel="stylesheet">
    
    <title>next adventure</title>
    <style>
        :root { --bg-dark: #0f1115; --bg-light: #f4f5f7; --accent: rgba(255, 255, 255, 0.9); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; margin: 0; 
            background-color: var(--bg-dark);
            overflow-x: hidden; overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }
        
        body { 
            color: var(--accent); font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100dvh;
        }
        
        body.light-mode { background-color: var(--bg-light); color: #2d3748; }

        /* Performance: hardware accelerated animations */
        .sync-reveal { opacity: 0; transform: translateY(8px); transition: opacity 0.8s ease, transform 0.8s ease; will-change: opacity, transform; }
        .sync-reveal.reveal { opacity: 1 !important; transform: translateY(0); }
        
        .timer-container { position: relative; text-align: center; width: 90%; max-width: 500px; padding: 60px 0; z-index: 1; }
        h1 { font-weight: 500; letter-spacing: -0.05em; font-size: clamp(2.2rem, 7vw, 2.8rem); margin: 0 0 16px 0; text-transform: lowercase; }
        h1 span { font-size: 0.8em; margin-left: 4px; }
        
        #full-date-display, #description-display { margin-bottom: 40px; font-size: 0.95rem; font-weight: 400; opacity: 0.6; }
        
        #countdown { display: flex; justify-content: center; align-items: center; width: 100%; max-width: 420px; gap: 12px; }
        .time-box { flex: 1; display: flex; flex-direction: column; align-items: center; height: 85px; }
        .time-box span { font-size: clamp(2.4rem, 8vw, 3.8rem); font-weight: 200; display: block; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
        .time-box span.is-due { opacity: 0.1; }
        
        .label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.25em; margin-top: 14px; opacity: 0.3; }

        #task-section { position: relative; width: 100%; max-width: 400px; margin: 50px auto 0 auto; text-align: left; }
        #new-task-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid transparent; color: inherit; font-family: inherit; font-size: 1rem; padding: 12px 0; outline: none; transition: border 0.3s; }
        #new-task-input::placeholder { color: rgba(128,128,128,0.4); }
        #new-task-input:focus { border-bottom: 1px solid rgba(128,128,128,0.2); }

        #task-list { list-style: none; padding: 0; margin: 0; max-height: 35vh; overflow-y: auto; scrollbar-width: none; -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%); }
        #task-list::-webkit-scrollbar { display: none; }
        
        #task-list li { 
            font-size: 1rem; display: flex; align-items: center; justify-content: space-between; 
            min-height: 52px; border-bottom: 1px solid rgba(128,128,128,0.05);
            animation: taskIn 0.3s cubic-bezier(0.2, 0, 0, 1) forwards;
        }
        
        @keyframes taskIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .task-text { display: flex; align-items: center; gap: 14px; cursor: pointer; flex: 1; padding: 12px 0; }
        /* Clean circles without using external images */
        .task-text::before { content: '○'; font-size: 1.3em; opacity: 0.4; width: 24px; text-align: center; flex-shrink: 0; }
        li.done .task-text { text-decoration: line-through; opacity: 0.3; }
        li.done .task-text::before { content: '●'; opacity: 0.7; }
        
        .task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
        #task-list li:hover .task-actions { opacity: 1; }
        @media (hover: none) { .task-actions { opacity: 0.5; } }
        
        .action-btn { background: transparent; border: none; color: inherit; padding: 10px; cursor: pointer; display: flex; align-items: center; }
        .action-btn svg { width: 18px; height: 18px; opacity: 0.6; pointer-events: none; }

        .edit-task-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--accent); color: inherit; font-family: inherit; font-size: 1rem; padding: 4px 0; outline: none; }

        #theme-toggle { position: fixed; bottom: 30px; right: 30px; border: none; background: none; opacity: 0.25; cursor: pointer; color: inherit; z-index: 100; padding: 12px; }
        
        #cat-perch { position: fixed; bottom: 20px; left: 20px; width: 110px; height: 110px; z-index: 999; cursor: pointer; }
        @media (min-width: 1024px) { #cat-perch { width: 170px; height: 170px; } }
        
        .cat-image { 
            width: 100%; height: 100%; 
            background-size: contain; background-repeat: no-repeat; background-position: bottom left;
            /* Threshold mask: kills the watermark 'Freepik' ghosting on mobile */
            -webkit-mask-image: radial-gradient(circle at center, black 70%, transparent 100%);
            mask-image: radial-gradient(circle at center, black 70%, transparent 100%);
        }
        
        .suri-1 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri1.png'); }
        .suri-2 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri2.png'); }
        .suri-3 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri3.png'); }
        .suri-4 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri4.png'); }
        .suri-5 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri5.png'); }
        .suri-6 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri6.png'); }
        .suri-7 { background-image: url('https://raw.githubusercontent.com/Erunn/ournextadventure/main/suri7.png'); }
    </style>
</head>
<body>
    <div id="cat-perch" class="sync-reveal"></div> 
    
    <button id="theme-toggle" class="sync-reveal" aria-label="Toggle theme">
        <svg id="sun-icon" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
    
    <main class="timer-container sync-reveal">
        <h1 id="event-name"></h1>
        <div id="full-date-display" style="display:none;"></div>
        <div id="description-display" style="display:none;"></div>
        <div id="countdown" style="display:none;">
            <div class="time-box"><span id="days">00</span><div class="label">days</div></div>
            <div class="time-box"><span id="hours">00</span><div class="label">hrs</div></div>
            <div class="time-box"><span id="minutes">00</span><div class="label">min</div></div>
            <div class="time-box"><span id="seconds">00</span><div class="label">sec</div></div>
        </div>
        <section id="task-section" style="display:none;">
            <input type="text" id="new-task-input" placeholder="I would love to..." autocomplete="off">
            <ul id="task-list"></ul>
        </section>
    </main>
    
    <script>document.write('<script src="main.js?v=' + Date.now() + '"><\/script>');</script>
</body>
</html>
