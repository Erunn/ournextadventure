        :root {
            --bg-dark: #121417;
            --bg-light: #f9fafb;
            --accent: #ffffff;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),
                radial-gradient(circle at top, #1c1f26, var(--bg-dark));
            background-blend-mode: overlay;
            color: var(--accent);
            /* System font stack to bypass CORS errors */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex; justify-content: center; align-items: center; 
            min-height: 101vh; margin: 0;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            overscroll-behavior-y: auto;
        }

        body.light-mode {
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at top, #ffffff, var(--bg-light));
            color: #111827;
        }

        .sync-reveal {
            opacity: 0;
            transform: translateY(12px) translateZ(0);
            transition: opacity 0.8s cubic-bezier(0.2, 0, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
            backface-visibility: hidden;
            will-change: opacity, transform;
        }

        .sync-reveal.reveal {
            opacity: 1 !important;
            transform: translateY(0) translateZ(0);
        }

        .timer-container {
            position: relative; text-align: center; width: 90%; max-width: 500px; padding: 20px; z-index: 10;
        }

        h1 { font-weight: 600; letter-spacing: -0.02em; font-size: clamp(1.8rem, 6vw, 2.2rem); margin-bottom: 30px; text-transform: lowercase; }
        
        #countdown { display: flex; justify-content: space-around; align-items: center; margin: 40px auto; gap: 8px; }

        .time-box span { 
            font-family: 'SF Mono', 'ui-monospace', monospace; 
            font-size: clamp(2.2rem, 8vw, 3.5rem); 
            font-weight: 300; display: block; line-height: 1; 
            font-variant-numeric: tabular-nums; 
            transition: all 0.4s ease;
            contain: content;
        }

        .time-box span.is-due { opacity: 0.12; filter: blur(0.5px); transform: scale(0.92); }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; margin-top: 10px; color: rgba(255, 255, 255, 0.4); font-weight: 500; }
        body.light-mode .label { color: rgba(0, 0, 0, 0.5); }

        #theme-toggle {
            position: fixed; 
            bottom: calc(20px + var(--safe-bottom));

            color: inherit; opacity: 0.4; transition: all 0.3s ease; z-index: 100;
        }
